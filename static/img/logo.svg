<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Stylized anvil/forge icon - Foundry logo -->
  <g id="forge-logo">
    <!-- Anvil base -->
    <path d="M40 160 L160 160 L150 180 L50 180 Z" fill="#d4885f"/>
    
    <!-- Anvil body -->
    <path d="M60 80 L140 80 L150 160 L50 160 Z" fill="#e87d3e"/>
    
    <!-- Anvil horn (left side) -->
    <path d="M60 80 L40 60 L40 40 L60 60 Z" fill="#ff9b5a"/>
    
    <!-- Anvil face (top) -->
    <rect x="60" y="60" width="80" height="20" fill="#b8775a"/>
    
    <!-- Hammer impact glow effect -->
    <circle cx="100" cy="50" r="15" fill="#ff9b5a" opacity="0.3"/>
    
    <!-- Geometric accent lines -->
    <line x1="70" y1="100" x2="130" y2="100" stroke="#1a1d23" stroke-width="2"/>
    <line x1="70" y1="120" x2="130" y2="120" stroke="#1a1d23" stroke-width="2"/>
    <line x1="70" y1="140" x2="130" y2="140" stroke="#1a1d23" stroke-width="2"/>
  </g>
</svg>

